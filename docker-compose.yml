version: '3.8'

services:
  postgresql:
    image: postgres:15-alpine
    container_name: enderchest-db
    environment:
      POSTGRES_USER: enderchest
      POSTGRES_PASSWORD: enderchest123
      POSTGRES_DB: enderchest_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enderchest"]
      interval: 10s
      timeout: 5s
      retries: 5

  enderchest-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enderchest-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/enderchest_db
      SPRING_DATASOURCE_USERNAME: enderchest
      SPRING_DATASOURCE_PASSWORD: enderchest123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
    ports:
      - "8080:8080"
    depends_on:
      postgresql:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    command: >
      sh -c 'java -jar /app/app.jar'

volumes:
  postgres_data:
