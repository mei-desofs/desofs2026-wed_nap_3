# ==========================================
# Test Configuration for EnderChest
# ==========================================

# Server Configuration
server.port=0
spring.application.name=EnderChest-Test

# ==========================================
# Database Configuration (H2 for testing)
# ==========================================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (disabled in tests)
spring.h2.console.enabled=false

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false

# ==========================================
# Security Configuration (Test IdP)
# ==========================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://test-idp.example.com
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://test-idp.example.com/.well-known/jwks.json

# ==========================================
# EnderChest Custom Security Properties
# ==========================================

# Test storage directory
enderchest.storage.base-path=/tmp/enderchest_test_uploads/

# File size limit for tests (50MB for comprehensive testing)
enderchest.storage.max-file-size=50MB

# Storage quota per user (1GB for testing)
enderchest.storage.storage-quota=1GB

# Allowed MIME types (same as production)
enderchest.storage.allowed-mime-types=image/jpeg,image/png,application/pdf,text/plain

# Rate limiting configuration (tests should not be rate limited)
enderchest.rate-limit.requests-per-window=10000
enderchest.rate-limit.window-seconds=60

# ==========================================
# Logging Configuration
# ==========================================
logging.level.root=INFO
logging.level.pt.isep.desofs.enderchest=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==========================================
# Performance Configuration for Tests
# ==========================================
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
