# ==========================================
# 1. Server Configuration
# ==========================================
server.port=8080
spring.application.name=EnderChest

# ==========================================
# 2. Database Configuration (PostgreSQL)
# ==========================================
# DEV_TEAM: Replace with your local database credentials
spring.datasource.url=jdbc:postgresql://localhost:5432/enderchest_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update

# ==========================================
# 3. Security Configuration (IdP Integration)
# ==========================================
# DEV_TEAM: Replace this with the URL of the Identity Provider (e.g., Keycloak/Auth0)
# you will use to generate JWTs.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://your-idp-domain.com/realms/enderchest/protocol/openid-connect/certs

# ==========================================
# 4. Ender Chest Custom Security Properties
# ==========================================
# These match exactly with the ApplicationProperties.java class

# Where files are stored (MUST be outside the web root for security)
enderchest.storage.base-path=/tmp/enderchest_uploads/

# DoS Mitigation (SDR-05)
enderchest.storage.max-file-size=10MB

# Storage Quota Enforcement (SDR-NEW-07) - 1GB per user
enderchest.storage.storage-quota=1GB

# Web Shell Mitigation (SDR-03) - Only these exact MIME types are allowed
enderchest.storage.allowed-mime-types=image/jpeg,image/png,application/pdf,text/plain

# Rate Limiting (SDR-10) - 100 requests per minute per user
enderchest.rate-limit.requests-per-window=100
enderchest.rate-limit.window-seconds=60
# ==========================================
# 5. Actuator Configuration
# ==========================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
