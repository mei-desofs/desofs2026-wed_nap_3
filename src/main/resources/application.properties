# Configuração do Servidor
server.port=8080
spring.application.name=EnderChest

# Configuração da Base de Dados (PostgreSQL)
# DEV_TEAM: Usem as vossas credenciais locais para desenvolvimento.
spring.datasource.url=jdbc:postgresql://localhost:5432/enderchest_db
spring.datasource.username=enderchest_user
spring.datasource.password=secret_password
spring.jpa.hibernate.ddl-auto=update # 'validate' ou 'none' para produção.
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Configuração de Segurança (Integração com IdP Externo via JWT)
# DEV_TEAM: Este é o ponto mais importante. Substituam pelo URL do vosso IdP.
# O Spring Security usará este endpoint para obter as chaves públicas e validar os JWTs.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://idp.example.com/realms/myrealm/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://idp.example.com/realms/myrealm

# Configurações de Segurança da Aplicação
enderchest.storage.base-path=/srv/enderchest/files/ # Diretoria segura, FORA do web root.
enderchest.storage.max-file-size=10MB # Mitigação de DoS (SDR-05).
enderchest.storage.allowed-mime-types=image/jpeg,image/png,application/pdf # Whitelist para mitigar Web Shells (SDR-03).