name: CI/CD Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Compile and run all tests.
  # Both downstream jobs (sca, sast) gate on this one.
  # ──────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run tests
        env:
          # Tests load application-test.properties (H2 in-memory DB + jwk-set-uri override).
          # This env var is a safety net for any test that does not activate the test profile.
          # @WithMockUser bypasses JWT validation so the placeholder URI is never contacted.
          SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://localhost:9090/realms/test/protocol/openid-connect/certs
        run: mvn -B clean install

  # ──────────────────────────────────────────────────────────────
  # Job 2: Software Composition Analysis (SCA).
  # Fails the build if any dependency has CVSS >= 7.0 (HIGH).
  # ──────────────────────────────────────────────────────────────
  sca:
    name: SCA — OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Get week number for NVD cache key
        id: week
        run: echo "week=$(date +%Y-%U)" >> $GITHUB_OUTPUT

      - name: Cache NVD vulnerability database
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ steps.week.outputs.week }}
          restore-keys: owasp-nvd-${{ runner.os }}-

      - name: Run OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn -B dependency-check:check \
            -DnvdApiKey=${NVD_API_KEY} \
            -DfailOnError=false

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Job 3: Static Application Security Testing (SAST).
  # Uses GitHub CodeQL — results appear in the repository Security tab.
  # No external accounts or secrets required.
  # ──────────────────────────────────────────────────────────────
  sast:
    name: SAST — GitHub CodeQL
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended

      - name: Build for CodeQL
        run: mvn -B clean compile

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"
