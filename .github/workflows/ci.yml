name: CI/CD Pipeline

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Compile and run all tests.
  # All downstream jobs gate on this one.
  # ──────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run tests
        env:
          # Tests load application-test.properties (H2 in-memory DB + jwk-set-uri override).
          # This env var is a safety net for any test that does not activate the test profile.
          # @WithMockUser bypasses JWT validation so the placeholder URI is never contacted.
          SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://localhost:9090/realms/test/protocol/openid-connect/certs
        run: mvn -B clean install

  # ──────────────────────────────────────────────────────────────
  # Job 2: Software Composition Analysis (SCA).
  # Fails the build if any dependency has CVSS >= 7.0 (HIGH).
  # ──────────────────────────────────────────────────────────────
  sca:
    name: SCA — OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Get week number for NVD cache key
        id: week
        run: echo "week=$(date +%Y-%U)" >> $GITHUB_OUTPUT

      - name: Cache NVD vulnerability database
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ steps.week.outputs.week }}
          restore-keys: owasp-nvd-${{ runner.os }}-

      - name: Run OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn -B dependency-check:check \
            -DnvdApiKey=${NVD_API_KEY} \
            -DfailOnError=false \
            -DossindexAnalyzerEnabled=false

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Job 3: SAST — SonarCloud analysis with coverage.
  # Results appear in sonarcloud.io under the project dashboard.
  # ──────────────────────────────────────────────────────────────
  sonar:
    name: SAST — SonarCloud
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build, test and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://localhost:9090/realms/test/protocol/openid-connect/certs
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=mei-desofs-wed-nap-3_mei-desofs-wed-nap-3-sonarqube

  # ──────────────────────────────────────────────────────────────
  # Job 4: Container Security Scan — Trivy.
  # Builds the Docker image and scans OS-level packages for CVEs
  # that OWASP DC cannot see (Alpine packages, JRE native libs).
  # Fails on HIGH/CRITICAL severity with a known fix available.
  # ignore-unfixed: true mirrors the OWASP DC suppression policy —
  # we only block on vulnerabilities we can actually fix.
  # ──────────────────────────────────────────────────────────────
  trivy:
    name: Container Scan — Trivy
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t enderchest:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: enderchest:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  # ──────────────────────────────────────────────────────────────
  # Job 5: Helm chart lint and Kubernetes manifest validation.
  # Catches broken chart templates and invalid K8s manifests
  # before they reach the deploy job.
  # ──────────────────────────────────────────────────────────────
  helm-validate:
    name: Helm Validate
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate Helm chart
        uses: ./.github/actions/helm-validate

  # ──────────────────────────────────────────────────────────────
  # Job 6: DAST — OWASP ZAP API Scan.
  # Starts the application against a real PostgreSQL container and
  # runs ZAP against the OpenAPI spec. ZAP tests the HTTP layer:
  # security headers, error handling, and 401 enforcement.
  # -I flag: report findings without failing the build — to be
  # tightened once a ZAP alert filter is configured.
  # ──────────────────────────────────────────────────────────────
  dast:
    name: DAST — OWASP ZAP
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: enderchest_dast
          POSTGRES_USER: enderchest
          POSTGRES_PASSWORD: enderchest_dast
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn -B clean package -DskipTests

      - name: Start application
        run: |
          java -jar target/enderchest-*.jar \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/enderchest_dast \
            --spring.datasource.username=enderchest \
            --spring.datasource.password=enderchest_dast \
            --spring.jpa.hibernate.ddl-auto=create \
            --spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9090/realms/test/protocol/openid-connect/certs &

      - name: Wait for application to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/v3/api-docs > /dev/null; then
              echo "Application is ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done
          echo "Application failed to start"
          exit 1

      - name: Run OWASP ZAP API scan
        run: |
          mkdir -p zap-output
          chmod 777 zap-output
          docker run --network host \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-api-scan.py \
              -t http://localhost:8080/v3/api-docs \
              -f openapi \
              -r zap-report.html \
              -I

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-dast-report
          path: zap-output/zap-report.html
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Job 7: Deploy — only on main, after all checks pass.
  # Builds Docker image, pushes to GHCR, packages Helm chart,
  # and deploys to a remote Kind cluster via SSH.
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kind cluster
    runs-on: ubuntu-latest
    needs: [build-and-test, sca, sonar, trivy, dast, helm-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy Ender Chest
        uses: ./.github/actions/deploy
        with:
          app-id: ${{ secrets.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
