# Composite Action: Helm chart lint + kubeconform schema validation
name: "Helm Chart Validation"
description: "Lints the Helm chart and validates rendered manifests against Kubernetes schemas with kubeconform"

inputs:
  chart-path:
    description: "Path to the Helm chart directory"
    required: false
    default: "./helm-chart"
  kubernetes-version:
    description: "Kubernetes version to validate against"
    required: false
    default: "1.29.0"
  image-repository:
    description: "Image repository to use for template rendering"
    required: false
    default: "ghcr.io/mei-desofs/desofs2026-wed_nap_3/ender-chest"

runs:
  using: "composite"
  steps:
    - name: Set up Helm
      uses: azure/setup-helm@v4

    - name: Helm lint (strict)
      shell: bash
      run: |
        helm dependency build ${{ inputs.chart-path }}
        helm lint ${{ inputs.chart-path }} --strict

    - name: Install kubeconform
      shell: bash
      run: |
        KUBECONFORM_VERSION="0.6.7"
        curl -sSLo kubeconform.tar.gz "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
        tar xzf kubeconform.tar.gz -C "${RUNNER_TEMP}" kubeconform
        chmod +x "${RUNNER_TEMP}/kubeconform"
        echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

    - name: Render and validate Kubernetes manifests
      shell: bash
      run: |
        helm template ender-chest ${{ inputs.chart-path }} \
          --set image.repository=${{ inputs.image-repository }} \
          --set image.tag=validation-test \
          | kubeconform \
            -strict \
            -summary \
            -output text \
            -kubernetes-version ${{ inputs.kubernetes-version }}
