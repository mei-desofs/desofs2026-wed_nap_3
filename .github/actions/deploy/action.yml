# Composite Action: Build, push to GHCR, and deploy to K3s cluster via SSH
name: "Deploy Ender Chest"
description: "Builds Docker image, pushes to GHCR, packages Helm chart, and deploys to remote K3s cluster"

inputs:
  app-id:
    description: "GitHub App ID"
    required: true
  app-private-key:
    description: "GitHub App private key (PEM)"
    required: true
  ssh-private-key:
    description: "SSH private key for remote VM"
    required: true

runs:
  using: "composite"
  steps:
    # ─── Generate short-lived GitHub App token ───
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}

    # ─── Log in to GHCR ───
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    # ─── Build and push Docker image ───
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/mei-desofs/desofs2026-wed_nap_3/ender-chest:${{ github.sha }}

    # ─── Package and push Helm chart ───
    - name: Set up Helm
      uses: azure/setup-helm@v4

    - name: Package and push Helm chart
      shell: bash
      run: |
        echo "${{ github.token }}" | helm registry login ghcr.io \
          --username ${{ github.actor }} --password-stdin
        helm package ./helm-chart --version 0.1.${{ github.run_number }}
        helm push enderchest-0.1.${{ github.run_number }}.tgz \
          oci://ghcr.io/mei-desofs/desofs2026-wed_nap_3/charts

    # ─── Write SSH key to file ───
    - name: Write SSH key to file
      shell: bash
      run: |
        echo "${{ inputs.ssh-private-key }}" > /tmp/id_ed25519
        chmod 600 /tmp/id_ed25519

    # ─── Set deploy environment variables ───
    - name: Set deploy env vars
      shell: bash
      run: |
        echo "APP_TOKEN=${{ github.token }}" >> $GITHUB_ENV
        echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
        echo "CHART_VERSION=${{ github.run_number }}" >> $GITHUB_ENV
        echo "GITHUB_ACTOR=${{ github.actor }}" >> $GITHUB_ENV

    # ─── Deploy to K3s cluster via SSH ───
    - name: Deploy to K3s cluster via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: 172.160.228.21
        username: azureuser
        port: 22
        key_path: /tmp/id_ed25519
        timeout: 60s
        command_timeout: 30m
        envs: APP_TOKEN,IMAGE_TAG,CHART_VERSION,GITHUB_ACTOR
        script: |
          set -e

          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          
          # Ensure K3s is running
          if ! systemctl is-active --quiet k3s; then
            echo "ERROR: K3s is not running"
            exit 1
          fi

          # Refresh GHCR pull secret
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="${GITHUB_ACTOR}" \
            --docker-password="${APP_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Log Helm into GHCR
          echo "${APP_TOKEN}" | helm registry login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

          # Deploy with Helm
          helm upgrade --install ender-chest \
            oci://ghcr.io/mei-desofs/desofs2026-wed_nap_3/charts/enderchest \
            --version "0.1.${CHART_VERSION}" \
            --set image.repository=ghcr.io/mei-desofs/desofs2026-wed_nap_3/ender-chest \
            --set image.tag="${IMAGE_TAG}" \
            --set imagePullSecrets[0].name=ghcr-secret \
            --wait
