# Composite Action: Build, push to GHCR, and deploy to Kind cluster via SSH
name: "Deploy Ender Chest"
description: "Builds Docker image, pushes to GHCR, packages Helm chart, and deploys to remote Kind cluster"

inputs:
  app-id:
    description: "GitHub App ID"
    required: true
  app-private-key:
    description: "GitHub App private key (PEM)"
    required: true
  ssh-private-key:
    description: "SSH private key for remote VM"
    required: true

runs:
  using: "composite"
  steps:
    # ─── Generate short-lived GitHub App token ───
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}

    # ─── Log in to GHCR (use GITHUB_TOKEN for push) ───
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    # ─── Build and push Docker image ───
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/mei-desofs/desofs2026-wed_nap_3/ender-chest:${{ github.sha }}

    # ─── Package and push Helm chart ───
    - name: Set up Helm
      uses: azure/setup-helm@v4

    - name: Package and push Helm chart
      shell: bash
      run: |
        echo "${{ github.token }}" | helm registry login ghcr.io \
          --username ${{ github.actor }} --password-stdin
        helm package ./helm-chart --version 0.1.${{ github.run_number }}
        helm push enderchest-0.1.${{ github.run_number }}.tgz \
          oci://ghcr.io/mei-desofs/desofs2026-wed_nap_3/charts
          
    - name: Write SSH key to file
      shell: bash
      run: |
        echo "${{ inputs.ssh-private-key }}" > /tmp/id_ed25519
        chmod 600 /tmp/id_ed25519
    
    - name: Deploy to Kind cluster via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: vsgate-ssh.dei.isep.ipp.pt
        username: root
        port: 10581
        key_path: /tmp/id_ed25519
        timeout: 60s
        envs: APP_TOKEN,IMAGE_TAG,CHART_VERSION,GITHUB_ACTOR
        script: |
          set -e

          # Refresh GHCR pull secret
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="${GITHUB_ACTOR}" \
            --docker-password="${APP_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Ensure Kind cluster exists (with port mappings for ingress)
          if ! kind get clusters 2>/dev/null | grep -q "^ender-chest$"; then
            echo "Creating Kind cluster 'ender-chest' with ingress port mappings..."

            # Write Kind config inline (the k8s/kind-config.yaml from the repo)
            cat <<'EOF' > /tmp/kind-config.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
              kubeadmConfigPatches:
                - |
                  kind: InitConfiguration
                  nodeRegistration:
                    kubeletExtraArgs:
                      node-labels: "ingress-ready=true"
              extraPortMappings:
                - containerPort: 80
                  hostPort: 80
                  protocol: TCP
                - containerPort: 8080
                  hostPort: 8080
                  protocol: TCP
          EOF
            kind create cluster --name ender-chest --config /tmp/kind-config.yaml
            rm /tmp/kind-config.yaml

            # Install Traefik ingress controller
            helm repo add traefik https://traefik.github.io/charts
            helm repo update
            helm install traefik traefik/traefik \
              --namespace traefik --create-namespace \
              --set ports.web.hostPort=80 \
              --set ports.web.nodePort=30080 \
              --set service.type=NodePort \
              --set nodeSelector."ingress-ready"=true \
              --set tolerations[0].key=node-role.kubernetes.io/control-plane \
              --set tolerations[0].operator=Equal \
              --set tolerations[0].effect=NoSchedule
          else
            echo "Kind cluster 'ender-chest' already exists."
          fi

          # Log Helm into GHCR
          echo "${APP_TOKEN}" | helm registry login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

          # Deploy with Helm
          helm upgrade --install ender-chest \
            oci://ghcr.io/mei-desofs/desofs2026-wed_nap_3/charts/enderchest \
            --version "0.1.${CHART_VERSION}" \
            --set image.repository=ghcr.io/mei-desofs/desofs2026-wed_nap_3/ender-chest \
            --set image.tag="${IMAGE_TAG}" \
            --set imagePullSecrets[0].name=ghcr-secret
      env:
        APP_TOKEN: ${{ steps.app-token.outputs.token }}
        IMAGE_TAG: ${{ github.sha }}
        CHART_VERSION: ${{ github.run_number }}
        GITHUB_ACTOR: ${{ github.actor }}
