name: "Deploy Ender Chest"
description: "Builds Docker image, pushes to GHCR, and deploys to DEI VS with Docker Compose"

inputs:
  app-id:
    description: "GitHub App ID"
    required: true
  app-private-key:
    description: "GitHub App private key (PEM)"
    required: true
  ssh-private-key:
    description: "SSH private key for DEI VM"
    required: true

runs:
  using: "composite"
  steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/mei-desofs/desofs2026-wed_nap_3/ender-chest:${{ github.sha }}
          ghcr.io/mei-desofs/desofs2026-wed_nap_3/ender-chest:latest

    - name: Write SSH key to file
      shell: bash
      run: |
        echo "${{ inputs.ssh-private-key }}" > /tmp/id_ed25519
        chmod 600 /tmp/id_ed25519

    - name: Set deploy env vars
      shell: bash
      run: |
        echo "APP_TOKEN=${{ github.token }}" >> $GITHUB_ENV
        echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
        echo "GITHUB_ACTOR=${{ github.actor }}" >> $GITHUB_ENV

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: vsgate-ssh.dei.isep.ipp.pt
        username: root
        port: 10581
        key_path: /tmp/id_ed25519
        timeout: 30s
        command_timeout: 5m
        envs: APP_TOKEN,IMAGE_TAG,GITHUB_ACTOR
        script: |
          set -e

          echo "${APP_TOKEN}" | docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

          sed -i "s|ender-chest:.*|ender-chest:${IMAGE_TAG}|" /root/docker-compose.yml

          docker compose -f /root/docker-compose.yml pull app
          docker compose -f /root/docker-compose.yml up -d
