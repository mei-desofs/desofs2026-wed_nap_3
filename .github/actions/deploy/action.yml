# Composite Action: Build, push to GHCR, and deploy to Kind cluster via SSH
name: "Deploy Ender Chest"
description: "Builds Docker image, pushes to GHCR, packages Helm chart, and deploys to remote Kind cluster"

inputs:
  app-id:
    description: "GitHub App ID"
    required: true
  app-private-key:
    description: "GitHub App private key (PEM)"
    required: true
  ssh-private-key:
    description: "SSH private key for remote VM"
    required: true

runs:
  using: "composite"
  steps:
    # ─── Generate short-lived GitHub App token ───
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}

    # ─── Log in to GHCR ───
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ steps.app-token.outputs.token }}

    # ─── Build and push Docker image ───
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/mei-desofs/desofs2026-wed_nap_3/ender-chest:${{ github.sha }}

    # ─── Package and push Helm chart ───
    - name: Package and push Helm chart
      shell: bash
      run: |
        echo "${{ steps.app-token.outputs.token }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin
        helm package ./helm-chart --version 0.1.${{ github.run_number }}
        helm push enderchest-0.1.${{ github.run_number }}.tgz oci://ghcr.io/mei-desofs/desofs2026-wed_nap_3/charts

    # ─── Deploy to remote VM via SSH ───
    - name: Deploy to Kind cluster via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: vsgate-ssh.dei.isep.ipp.pt
        username: root
        port: 10581
        key: ${{ inputs.ssh-private-key }}
        envs: APP_TOKEN,IMAGE_TAG,CHART_VERSION,GITHUB_ACTOR
        script: |
          set -e

          # Refresh GHCR pull secret
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="${GITHUB_ACTOR}" \
            --docker-password="${APP_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Ensure Kind cluster exists
          if ! kind get clusters 2>/dev/null | grep -q "^ender-chest$"; then
            echo "Creating Kind cluster 'ender-chest'..."
            kind create cluster --name ender-chest
          else
            echo "Kind cluster 'ender-chest' already exists."
          fi

          # Log Helm into GHCR
          echo "${APP_TOKEN}" | helm registry login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

          # Deploy with Helm
          helm upgrade --install ender-chest \
            oci://ghcr.io/mei-desofs/desofs2026-wed_nap_3/charts/enderchest \
            --version "0.1.${CHART_VERSION}" \
            --set image.repository=ghcr.io/mei-desofs/desofs2026-wed_nap_3/ender-chest \
            --set image.tag="${IMAGE_TAG}" \
            --set imagePullSecrets[0].name=ghcr-secret
      env:
        APP_TOKEN: ${{ steps.app-token.outputs.token }}
        IMAGE_TAG: ${{ github.sha }}
        CHART_VERSION: ${{ github.run_number }}
        GITHUB_ACTOR: ${{ github.actor }}
