# Default values for EnderChest Helm deployment
replicaCount: 1

image:
  repository: desofs2026-wed_nap_3-enderchest-app
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8080
  name: enderchest-app

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: enderchest.swedencentral.cloudapp.azure.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: enderchest-tls
      hosts:
        - enderchest.swedencentral.cloudapp.azure.com

postgresql:
  enabled: true
  image: postgres:16-alpine
  auth:
    username: postgres
    password: postgres
    database: enderchest_db
  persistence:
    enabled: true
    size: 10Gi

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://ender-chest-enderchest-postgresql:5432/enderchest_db"
  SPRING_DATASOURCE_USERNAME: "postgres"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SPRING_PROFILES_ACTIVE: "prod"
  FILE_STORAGE_BASE_PATH: "/data/files"

persistence:
  enabled: true
  size: 10Gi
  mountPath: /data/files

# ═══════════════════════════════════════════════════════════════
# ELK Stack — Centralized audit logging (SDR-NEW-03)
# Elasticsearch + Kibana + Filebeat for structured log analysis
# ═══════════════════════════════════════════════════════════════
elk:
  enabled: true
  elasticsearch:
    persistence:
      enabled: true
      size: 5Gi

# ═══════════════════════════════════════════════════════════════
# TLS — Automatic Let's Encrypt via Traefik's built-in ACME
# No extra pods needed. Requires ports 80 + 443 open.
# ═══════════════════════════════════════════════════════════════
tls:
  enabled: true
  acmeEmail: your-email@isep.ipp.pt
