# Default values for EnderChest Helm deployment
replicaCount: 1

image:
  repository: desofs2026-wed_nap_3-enderchest-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  name: enderchest-app

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: enderchest.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: enderchest-tls
      hosts:
        - enderchest.local

postgresql:
  enabled: true
  auth:
    username: postgres
    password: postgres
    database: enderchest_db
  primary:
    persistence:
      enabled: true
      size: 10Gi

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://enderchest-postgresql:5432/enderchest_db"
  SPRING_DATASOURCE_USERNAME: "postgres"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  FILE_STORAGE_BASE_PATH: "/data/files"

persistence:
  enabled: true
  size: 10Gi
  mountPath: /data/files
