meta:
  name: Deduplication - Same File Upload
  type: http
  seq: 9

http:
  method: POST
  url: "{{base_url}}/api/files/upload"
  
  headers:
    Authorization: "Bearer {{bearer_token}}"
    Content-Type: multipart/form-data

  body:
    multipartForm:
      - name: file
        type: file
        value: test_valid.pdf

tests: |
  test("Upload duplicate PDF - Should Return 409 or 200", function() {
    expect([200, 409]).to.include(res.code);
  });
  
  test("Response contains hash", function() {
    expect(res.body).to.include("hash");
  });
  
  test("Deduplication detected", function() {
    expect(res.body).to.include("isDuplicate") || expect(res.code).to.equal(409);
  });
