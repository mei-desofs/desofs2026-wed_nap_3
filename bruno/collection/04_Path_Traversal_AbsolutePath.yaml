meta:
  name: Path Traversal - Absolute Path Attack
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/api/files/upload"
  
  headers:
    Authorization: "Bearer {{bearer_token}}"
    Content-Type: multipart/form-data

  body:
    multipartForm:
      - name: file
        type: file
        value: /etc/passwd

tests: |
  test("Path Traversal with / - Should Return 400", function() {
    expect(res.code).to.equal(400);
  });
  
  test("Response indicates path traversal error", function() {
    expect(res.body).to.include("PathTraversalAttemptException");
  });
  
  test("File should not be created", function() {
    expect(res.body).to.include("invalid");
  });
