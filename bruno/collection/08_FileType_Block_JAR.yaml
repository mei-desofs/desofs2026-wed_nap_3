meta:
  name: File Type Blocking - JAR
  type: http
  seq: 8

http:
  method: POST
  url: "{{base_url}}/api/files/upload"
  
  headers:
    Authorization: "Bearer {{bearer_token}}"
    Content-Type: multipart/form-data

  body:
    multipartForm:
      - name: file
        type: file
        value: backdoor.jar

tests: |
  test("Upload JAR - Should Return 400", function() {
    expect(res.code).to.equal(400);
  });
  
  test("Response indicates invalid file type", function() {
    expect(res.body).to.include("InvalidFileTypeException");
  });
  
  test("Java archive blocked", function() {
    expect(res.body).to.include("not allowed");
  });
