version: '3.9'

services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@enderchest.local"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt
    networks:
      - enderchest-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`traefik.localhost`)
      - traefik.http.services.traefik.loadbalancer.server.port=8080

  enderchest-db:
    image: postgres:16-alpine
    container_name: enderchest-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enderchest_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enderchest-net

  enderchest-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enderchest-app
    depends_on:
      enderchest-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://enderchest-db:5432/enderchest_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FILE_STORAGE_BASE_PATH: /data/files
    volumes:
      - file-storage:/data/files
    labels:
      - traefik.enable=true
      - traefik.http.routers.enderchest.rule=Host(`enderchest.localhost`)
      - traefik.http.routers.enderchest.entrypoints=web,websecure
      - traefik.http.routers.enderchest.tls.certresolver=letsencrypt
      - traefik.http.services.enderchest.loadbalancer.server.port=8080
      - traefik.http.routers.enderchest-web.rule=Host(`enderchest.localhost`)
      - traefik.http.routers.enderchest-web.entrypoints=web
      - traefik.http.middlewares.enderchest-redirect.redirectscheme.scheme=https
      - traefik.http.routers.enderchest-web.middlewares=enderchest-redirect@docker
    networks:
      - enderchest-net

volumes:
  postgres-data:
  file-storage:

networks:
  enderchest-net:
    driver: bridge
